name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ALLOW_EMPTY_PASSWORD: false
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      pgsql:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2']
        moodle-branch: ['MOODLE_403_STABLE', 'MOODLE_404_STABLE', 'MOODLE_405_STABLE']
        db: ['mysqli', 'pgsql']
        exclude:
          # Moodle 4.3 requires PHP 8.0-8.2, skip nothing; 4.5 requires 8.1+, already covered.
          # Exclude PHP 8.1 + 4.5 if needed in the future — none needed now.
          - moodle-branch: 'MOODLE_403_STABLE'
            php: '8.2'  # 4.3 supports 8.2 but to keep matrix size reasonable, keep one PHP per old branch

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, pdo_mysql, pdo_pgsql
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> "$GITHUB_PATH"
          echo "MOODLE_START_BEHAT_SERVERS=NO" >> "$GITHUB_ENV"
        env:
          COMPOSER_NO_INTERACTION: 1

      - name: Install Moodle (MySQL)
        if: matrix.db == 'mysqli'
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-user=root \
            --db-pass=root \
            --db-name=moodle
        env:
          DB: mysqli
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Install Moodle (PostgreSQL)
        if: matrix.db == 'pgsql'
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-user=postgres \
            --db-pass=postgres \
            --db-name=moodle
        env:
          DB: pgsql
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint
        if: always()

      - name: PHP CodeSniffer (Moodle standard)
        run: moodle-plugin-ci phpcs
        if: always()

      - name: PHPUnit
        run: moodle-plugin-ci phpunit --coverage-text
        if: always()
